<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4caf50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2e7d32;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: Leaf with Recycle Loop -->
  <g transform="translate(10, 10)">
    <path d="M20,0 C30,10 40,30 20,40 C0,30 10,10 20,0 Z" fill="url(#leafGradient)" />
    <path d="M15,20 A10,10 0 1,1 25,20" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.8" />
    <polygon points="25,20 22,17 28,17" fill="#ffffff" opacity="0.8" />
  </g>
  <!-- Logo Text -->
  <text x="60" y="42" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="bold">
    <tspan fill="#2e7d32">Eco</tspan><tspan fill="#2e7d32">Junk</tspan>
  </text>
