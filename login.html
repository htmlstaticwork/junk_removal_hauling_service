<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EcoJunk Hauling</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/logo.png">
    <style>
        body { background: #F9FAFB; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-card { max-width: 450px; width: 100%; border: none; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .auth-logo { height: 60px; margin-bottom: 20px; }
        .btn-auth { width: 100%; padding: 12px; font-weight: 600; font-size: 1.1rem; }
        .password-toggle { cursor: pointer; position: absolute; right: 15px; top: 12px; }
    </style>
</head>
<body>

    <div class="container d-flex justify-content-center">
        <div class="card auth-card p-4 p-md-5 bg-white">
            <div class="text-center mb-4">
                <a href="index.html"><img src="assets/logo.png" alt="EcoJunk" class="auth-logo"></a>
                <h2 class="fw-bold">Welcome Back</h2>
                <p class="text-muted small">Access your dashboard and track your pickups.</p>
            </div>
            
            <form action="dashboard.html">
                <div class="mb-4">
                    <label class="form-label small fw-bold">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="mb-4 position-relative">
                    <label class="form-label small fw-bold">Password</label>
                    <div class="position-relative">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        <i class="bi bi-eye password-toggle text-muted" id="togglePassword"></i>
                    </div>
                    <div class="text-end mt-2">
                        <a href="#" class="text-primary-green small text-decoration-none">Forgot Password?</a>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label small" for="remember">Keep me logged in</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-success btn-auth mb-3">Log In</button>
            </form>
            
            <div class="text-center mt-3">
                <p class="small text-muted mb-0">Don't have an account? <a href="signup.html" class="text-primary-green fw-bold text-decoration-none">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        if (togglePassword && password) {
            togglePassword.addEventListener('click', function() {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                this.classList.toggle('bi-eye');
                this.classList.toggle('bi-eye-slash');
            });
        }
    </script>
</body>
</html>
